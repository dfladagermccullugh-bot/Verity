# Weekly reliability canary — AAPOR 2026 §4.1.3 + §4.2.4.
#
# Re-runs the fixed reference seeds against the live Anthropic model, diffs
# the result against the committed baseline, and opens a GitHub Issue if any
# observable drifts beyond the tolerances in src/lib/canaries/compare.ts.
#
# Schedule-only. Do not add a pull_request trigger — the canary burns API
# credits and the per-PR cost would add up fast.
name: canary

on:
  schedule:
    # Mondays 13:00 UTC — early enough in the week to act on a drift report.
    - cron: "0 13 * * 1"
  # Manual trigger for ad-hoc re-runs and the first post-merge baseline check.
  workflow_dispatch:

permissions:
  contents: read
  # Required so the workflow can open an Issue on drift.
  issues: write

jobs:
  canary:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Run canary
        id: canary
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Match production deliberately — drift detection only works when
          # the canary and the deployed app read the same model id.
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL }}
        run: |
          set +e
          npm run canary 2>&1 | tee canary.log
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Open drift issue
        if: steps.canary.outputs.exit_code == '1'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const log = fs.readFileSync('canary.log', 'utf8');
            const body = [
              '⚠ Reliability canary detected drift outside committed tolerances.',
              '',
              'See AAPOR 2026 §4.1.3 + §4.2.4 — the rationale for treating this',
              'as a substantive incident rather than test noise lives in the',
              '"Survey methodology" section of the README.',
              '',
              '## Drift report',
              '',
              '```',
              log,
              '```',
              '',
              '## Triage',
              '',
              '1. Reproduce locally with `npm run canary`.',
              '2. Inspect the per-seed table. If the drift reflects a real',
              '   provider-side change, decide whether to (a) accept and',
              '   rebaseline with `npm run canary:rebaseline`, or (b) pin the',
              '   model and investigate.',
              '3. Never rebaseline without an explicit reason recorded in the',
              '   commit message — silent rebaselining turns drift detection',
              '   into theater.',
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Canary drift detected — ${new Date().toISOString().slice(0, 10)}`,
              body,
              labels: ['canary', 'reliability'],
            });

      - name: Fail the run if drift was detected
        if: steps.canary.outputs.exit_code != '0'
        run: exit ${{ steps.canary.outputs.exit_code }}
